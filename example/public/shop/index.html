<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>麒麟手机商店 - Kylin Phone Store</title>
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div id="app">
            <!-- 顶部导航栏 -->
            <nav class="top-nav">
                <div class="container">
                    <div class="logo">
                        <div class="logo-icon">🐲</div>
                        <span>麒麟手机商店</span>
                    </div>
                    <div class="nav-menu">
                        <kylin-link to="/">
                            <span>🏠</span>
                            <span>首页</span>
                        </kylin-link>
                        <kylin-link to="/products">
                            <span>📱</span>
                            <span>产品</span>
                        </kylin-link>
                        <kylin-link to="/services">
                            <span>🔧</span>
                            <span>服务</span>
                        </kylin-link>
                        <kylin-link to="/docs">
                            <span>📚</span>
                            <span>文档</span>
                        </kylin-link>
                        <kylin-link to="/store">
                            <span>🏪</span>
                            <span>商店</span>
                        </kylin-link>
                        <kylin-link to="/profile">
                            <span>👤</span>
                            <span>我的</span>
                        </kylin-link>
                    </div>
                    <div class="user-info">
                        <div
                            class="user-avatar"
                            @click="window.router.push('/profile')"
                            x-text="isLoggedIn ? '✅' : '👤'"
                        ></div>
                    </div>
                </div>
            </nav>

            <!-- 主内容区 -->
            <div class="main-content">
                <div class="content-area">
                    <kylin-outlet path="/"></kylin-outlet>
                </div>
            </div>
        </div>

        <script type="module">
            import { createRouter } from "/src/index.ts";

            // 创建路由器
            const app = document.getElementById("app");
            const router = createRouter(app, {
                base: "/public/shop", // 配置基础路径
                home: "/", // 配置首页路径
                routes: [
                    // 首页
                    {
                        path: "",
                        view: "pages/home.html",
                        data: "data/home.json",
                    },

                    // 产品页面（包含左侧边栏和 outlet）
                    {
                        path: "products",
                        view: ".pages/products.html",
                        children: [
                            // 产品列表（默认显示）
                            {
                                path: "",
                                view: "pages/products-list.html",
                                data: "data/products.json",
                            },
                            // 产品分类
                            {
                                path: ":category",
                                view: "pages/products-list.html",
                                data: {
                                    from: async (context) => {
                                        const response = await fetch(".data/products.json");
                                        const allProducts = await response.json();
                                        const category = context.params.category;

                                        const categoryNames = {
                                            smartphones: "智能手机",
                                            tablets: "平板电脑",
                                            laptops: "笔记本电脑",
                                            wearables: "智能穿戴",
                                            accessories: "配件专区",
                                            "smart-home": "智能家居",
                                            audio: "音频设备",
                                            gaming: "游戏设备",
                                        };

                                        const products = allProducts.products.filter(
                                            (p) => p.category === category,
                                        );

                                        return {
                                            title: categoryNames[category] || category,
                                            subtitle: `共 ${products.length} 款${categoryNames[category] || category}`,
                                            products: products,
                                        };
                                    },
                                },
                            },
                        ],
                    },

                    // 产品详情
                    {
                        path: "product/:id",
                        view: "pages/product-detail.html",
                        data: {
                            from: async (context) => {
                                const response = await fetch(".data/products.json");
                                const allProducts = await response.json();
                                const product = allProducts.products.find(
                                    (p) => p.id === context.params.id,
                                );
                                return product || {};
                            },
                        },
                    },

                    // 服务页面（包含左侧边栏和 outlet）
                    {
                        path: "services",
                        view: "pages/services.html",
                        children: [
                            // 服务列表（默认显示）
                            {
                                path: "",
                                view: "pages/services-list.html",
                                data: "data/services.json",
                            },
                        ],
                    },

                    // 文档页面（包含左侧边栏和 outlet）
                    {
                        path: "docs",
                        view: "pages/docs.html",
                        children: [
                            // 文档列表（默认显示）
                            {
                                path: "",
                                view: "pages/docs-list.html",
                                data: "data/docs.json",
                            },
                        ],
                    },

                    // 商店页面（包含左侧边栏和 outlet）
                    {
                        path: "store",
                        view: "pages/store.html",
                        children: [
                            // 商店列表（默认显示）
                            {
                                path: "",
                                view: "pages/store-list.html",
                                data: "data/store.json",
                            },
                        ],
                    },

                    // 个人中心（需要认证）
                    {
                        path: "profile",
                        beforeEnter: async () => {
                            const alpineApp = document.getElementById("app")._x_dataStack[0];
                            if (!alpineApp.isLoggedIn) {
                                return "login";
                            }
                            return true;
                        },
                        view: "pages/profile.html",
                        data: "data/profile.json",
                    },

                    // 登录页面
                    {
                        path: "login",
                        view: "pages/login.html",
                        data: "data/login.json",
                    },
                ],
            });

            // 暴露路由器实例
            window.router = router;

            // 暴露 login 方法给全局
            window.handleLogin = async (username, password) => {
                const alpineApp = document.getElementById("app")._x_dataStack[0];
                alpineApp.loginForm.username = username;
                alpineApp.loginForm.password = password;
                await alpineApp.login();
            };
        </script>
    </body>
</html>
