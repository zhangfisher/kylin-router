<!-- 登录页面模板 -->
<div class="login-container">
    <div class="login-header">
        <h2 x-text="title"></h2>
        <p x-text="subtitle"></p>
    </div>
    <form class="login-form" @submit.prevent="window.handleLogin(loginForm.username, loginForm.password)">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" x-model="loginForm.username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" x-model="loginForm.password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="login-button">登录</button>
    </form>
    <div class="login-hint">
        <p>提示：输入任意用户名和密码即可登录</p>
    </div>
</div>
