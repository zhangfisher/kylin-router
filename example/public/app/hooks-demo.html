<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kylin Router - 钩子系统示例</title>
    <script type="module" src="../../src/index.ts"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        #app {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        nav {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        nav a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        nav a:hover {
            background-color: #f0f0f0;
        }
        nav a.active {
            background-color: #0066cc;
            color: white;
        }
        .content {
            padding: 20px 0;
        }
        .info {
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #2196f3;
        }
        .warning {
            background-color: #fff3e0;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #ff9800;
        }
        .error {
            background-color: #ffebee;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            border-left: 4px solid #f44336;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .log {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <nav>
            <kylin-link href="/">首页</kylin-link>
            <kylin-link href="/profile">个人资料</kylin-link>
            <kylin-link href="/admin">管理员面板</kylin-link>
            <kylin-link href="/users/123">用户详情</kylin-link>
            <kylin-link href="/redirect">重定向测试</kylin-link>
            <kylin-link href="/async">异步测试</kylin-link>
        </nav>

        <div class="content">
            <kylin-outlet></kylin-outlet>
        </div>

        <div class="log" id="navigation-log">
            <div class="log-entry" style="font-weight: bold;">导航日志：</div>
        </div>
    </div>

    <script type="module">
        import { KylinRouter } from '../../src/router.js';

        // 模拟认证状态
        let isAuthenticated = false;
        let userRole = 'user';

        // 路由配置
        const routes = [
            {
                name: 'home',
                path: '/',
                meta: {
                    title: '首页',
                    description: '欢迎使用 Kylin Router 钩子系统示例'
                },
                renderEach: (to, from, next) => {
                    // 数据预加载示例
                    next({
                        currentTime: new Date().toLocaleString(),
                        visitorCount: Math.floor(Math.random() * 1000)
                    });
                },
                component: `
                    <div>
                        <h1>欢迎来到 Kylin Router 钩子系统示例</h1>
                        <div class="info">
                            <strong>当前时间：</strong> {{currentTime}}<br>
                            <strong>访问人数：</strong> {{visitorCount}}
                        </div>
                        <p>本示例演示了 Kylin Router 的完整钩子系统功能：</p>
                        <ul>
                            <li><strong>beforeEach：</strong> 全局前置守卫，用于认证检查和日志记录</li>
                            <li><strong>renderEach：</strong> 数据预加载，在渲染前获取页面所需数据</li>
                            <li><strong>afterEach：</strong> 全局后置钩子，用于滚动到顶部和分析追踪</li>
                            <li><strong>beforeEnter：</strong> 路由级守卫，控制特定路由的访问权限</li>
                            <li><strong>afterLeave：</strong> 路由离开守卫，执行清理工作</li>
                        </ul>
                        <p>点击上方导航链接体验不同的钩子功能。</p>
                    </div>
                `
            },
            {
                name: 'profile',
                path: '/profile',
                meta: {
                    title: '个人资料',
                    requiresAuth: true
                },
                beforeEnter: (to, from) => {
                    // 路由级守卫：检查认证状态
                    if (!isAuthenticated) {
                        addLog('访问被拒绝：未登录，重定向到登录页面', 'warning');
                        return '/login';
                    }
                    return true;
                },
                renderEach: (to, from, next) => {
                    // 数据预加载：加载用户资料
                    setTimeout(() => {
                        next({
                            userProfile: {
                                name: '张三',
                                email: 'zhangsan@example.com',
                                role: userRole
                            }
                        });
                    }, 100);
                },
                component: `
                    <div>
                        <h1>个人资料</h1>
                        <div class="info">
                            <strong>用户名：</strong> {{userProfile.name}}<br>
                            <strong>邮箱：</strong> {{userProfile.email}}<br>
                            <strong>角色：</strong> {{userProfile.role}}
                        </div>
                        <p>此页面需要登录才能访问。beforeEnter 守卫会检查认证状态。</p>
                    </div>
                `
            },
            {
                name: 'admin',
                path: '/admin',
                meta: {
                    title: '管理员面板',
                    requiresAuth: true,
                    requiresAdmin: true
                },
                beforeEnter: (to, from) => {
                    // 路由级守卫：检查管理员权限
                    if (!isAuthenticated) {
                        addLog('访问被拒绝：未登录，重定向到登录页面', 'warning');
                        return '/login';
                    }
                    if (userRole !== 'admin') {
                        addLog('访问被拒绝：权限不足，重定向到首页', 'error');
                        return '/';
                    }
                    return true;
                },
                afterLeave: (to, from) => {
                    addLog('离开管理员面板，执行清理工作', 'info');
                },
                component: `
                    <div>
                        <h1>管理员面板</h1>
                        <div class="info">
                            <strong>管理员功能：</strong>
                            <ul>
                                <li>用户管理</li>
                                <li>系统设置</li>
                                <li>数据统计</li>
                            </ul>
                        </div>
                        <p>此页面需要管理员权限才能访问。</p>
                    </div>
                `
            },
            {
                name: 'user-detail',
                path: '/users/:id',
                meta: {
                    title: '用户详情'
                },
                renderEach: (to, from, next) => {
                    // 根据路由参数预加载数据
                    const userId = to.params.id;
                    addLog(`预加载用户 ${userId} 的数据...`, 'info');

                    setTimeout(() => {
                        next({
                            userId: userId,
                            userName: `用户${userId}`,
                            userStatus: 'active'
                        });
                    }, 100);
                },
                component: `
                    <div>
                        <h1>用户详情</h1>
                        <div class="info">
                            <strong>用户ID：</strong> {{userId}}<br>
                            <strong>用户名：</strong> {{userName}}<br>
                            <strong>状态：</strong> {{userStatus}}
                        </div>
                        <p>renderEach 钩子根据路由参数预加载了用户数据。</p>
                    </div>
                `
            },
            {
                name: 'redirect',
                path: '/redirect',
                meta: {
                    title: '重定向测试'
                },
                beforeEnter: (to, from) => {
                    addLog('触发重定向：/redirect -> /target', 'info');
                    return '/target';
                },
                component: `
                    <div>
                        <h1>重定向测试</h1>
                        <p>如果您看到此页面，说明重定向失败。</p>
                    </div>
                `
            },
            {
                name: 'target',
                path: '/target',
                meta: {
                    title: '重定向目标'
                },
                component: `
                    <div>
                        <h1>重定向成功</h1>
                        <div class="info">
                            <strong>目标页面：</strong> 您已成功从 /redirect 重定向到此页面。
                        </div>
                    </div>
                `
            },
            {
                name: 'async',
                path: '/async',
                meta: {
                    title: '异步测试'
                },
                renderEach: async (to, from, next) => {
                    addLog('开始异步数据加载...', 'info');
                    // 模拟异步数据加载
                    await new Promise(resolve => setTimeout(resolve, 500));
                    addLog('异步数据加载完成', 'info');
                    next({
                        asyncData: '异步加载的数据',
                        loadTime: '500ms'
                    });
                },
                component: `
                    <div>
                        <h1>异步测试</h1>
                        <div class="info">
                            <strong>异步数据：</strong> {{asyncData}}<br>
                            <strong>加载时间：</strong> {{loadTime}}
                        </div>
                        <p>此页面演示了异步数据预加载功能。</p>
                    </div>
                `
            },
            {
                name: 'login',
                path: '/login',
                meta: {
                    title: '登录'
                },
                component: `
                    <div>
                        <h1>登录页面</h1>
                        <div class="warning">
                            <strong>模拟登录：</strong>
                            <button onclick="simulateLogin()">模拟登录</button>
                            <button onclick="simulateAdminLogin()">模拟管理员登录</button>
                        </div>
                        <p>请登录以访问受保护的页面。</p>
                    </div>
                `
            },
            {
                name: 'not-found',
                path: '*',
                component: `
                    <div>
                        <h1>404 - 页面未找到</h1>
                        <div class="error">
                            <strong>错误：</strong> 您访问的页面不存在。
                        </div>
                    </div>
                `
            }
        ];

        // 创建路由实例
        const app = document.getElementById('app');
        const router = new KylinRouter(app, {
            routes: routes,
            mode: 'history',
            debug: true
        });

        // 全局 beforeEach：日志记录
        router.hooks.add('beforeEach', (to, from, next) => {
            addLog(`导航开始：${from.path || '初始'} -> ${to.path}`, 'info');
            next();
        });

        // 全局 beforeEach：认证检查
        router.hooks.add('beforeEach', (to, from, next) => {
            if (to.meta?.requiresAuth && !isAuthenticated) {
                addLog(`认证检查失败：${to.path} 需要登录`, 'warning');
                next('/login');
                return;
            }
            next();
        });

        // 全局 renderEach：页面标题设置
        router.hooks.add('renderEach', (to, from, next) => {
            if (to.meta?.title) {
                document.title = `${to.meta.title} - Kylin Router 示例`;
            }
            next();
        });

        // 全局 afterEach：滚动到顶部
        router.hooks.add('afterEach', (to, from) => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            addLog(`导航完成：${to.path}`, 'info');
        });

        // 全局 afterEach：分析追踪
        router.hooks.add('afterEach', (to, from) => {
            // 模拟页面访问统计
            if (typeof ga !== 'undefined') {
                ga('send', 'pageview', to.path);
            }
        });

        // 添加日志函数
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('navigation-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const timestamp = new Date().toLocaleTimeString();
            const typeIcon = {
                'info': 'ℹ️',
                'warning': '⚠️',
                'error': '❌'
            }[type] || 'ℹ️';

            entry.innerHTML = `[${timestamp}] ${typeIcon} ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // 模拟登录函数
        window.simulateLogin = function() {
            isAuthenticated = true;
            userRole = 'user';
            addLog('登录成功：普通用户', 'info');
            router.push('/profile');
        };

        window.simulateAdminLogin = function() {
            isAuthenticated = true;
            userRole = 'admin';
            addLog('登录成功：管理员', 'info');
            router.push('/admin');
        };

        // 绑定路由到 DOM
        router.attach();

        // 监听路由变化事件，用于渲染组件
        app.addEventListener('route-change', (event) => {
            const { route, params, query } = event.detail;

            // 简单的模板渲染
            if (route.component) {
                const outlet = app.querySelector('kylin-outlet');
                if (outlet) {
                    let html = route.component;

                    // 替换数据占位符
                    if (route.data) {
                        Object.keys(route.data).forEach(key => {
                            const placeholder = `{{${key}}}`;
                            const value = route.data[key];
                            html = html.replace(new RegExp(placeholder, 'g'), value);
                        });
                    }

                    // 替换参数占位符
                    if (params) {
                        Object.keys(params).forEach(key => {
                            const placeholder = `{{params.${key}}}`;
                            const value = params[key];
                            html = html.replace(new RegExp(placeholder, 'g'), value);
                        });
                    }

                    outlet.innerHTML = html;
                }
            }
        });

        // 监听导航开始事件
        app.addEventListener('navigation-start', (event) => {
            const { path, navigationType } = event.detail;
            addLog(`导航开始：${path || '浏览器操作'} (${navigationType})`, 'info');
        });

        // 监听导航结束事件
        app.addEventListener('navigation-end', (event) => {
            const { location, navigationType } = event.detail;
            addLog(`导航结束：${location.pathname} (${navigationType})`, 'info');
        });

        addLog('路由器初始化完成，准备就绪', 'info');
    </script>
</body>
</html>
