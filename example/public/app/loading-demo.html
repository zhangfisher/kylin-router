<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading 状态演示 - Kylin Router</title>
    <script src="../../src/index.ts" type="module"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .demo-links {
            margin-bottom: 30px;
        }

        .demo-links a {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .demo-links a:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .page-content {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 20px;
        }

        .loading-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #667eea;
        }

        .nested-outlet {
            border: 2px dashed #ddd;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            background: #fafafa;
        }

        .nested-outlet h3 {
            margin-top: 0;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚦 Loading 状态演示</h1>

        <div class="demo-links">
            <a href="#/">首页</a>
            <a href="#/slow">慢速加载 (2秒)</a>
            <a href="#/fast">快速加载 (0.5秒)</a>
            <a href="#/nested">嵌套路由</a>
            <a href="#/nested/slow">嵌套慢速加载</a>
        </div>

        <div id="app">
            <!-- Router 会自动创建 kylin-outlet -->
        </div>
    </div>

    <script type="module">
        import { KylinRouter } from '../../src/router.ts';

        const app = document.getElementById('app');

        const router = new KylinRouter(app, {
            routes: {
                name: 'root',
                path: '/',
                view: `
                    <div class="page-content">
                        <h2>欢迎首页</h2>
                        <p>这是一个快速加载的页面，您可能看不到loading状态。</p>
                        <p>请尝试点击上方的"慢速加载"链接来体验loading效果。</p>
                    </div>
                `,
                children: [
                    {
                        name: 'slow',
                        path: 'slow',
                        view: {
                            form: async () => {
                                // 模拟慢速加载
                                await new Promise(resolve => setTimeout(resolve, 2000));
                                return `
                                    <div class="page-content">
                                        <h2>🐢 慢速加载页面</h2>
                                        <p>这个页面模拟了2秒的加载时间。</p>
                                        <p>您应该已经看到了<kylin-loading>组件的loading动画。</p>
                                        <p>这就是loading状态的实际效果！</p>
                                    </div>
                                `;
                            }
                        }
                    },
                    {
                        name: 'fast',
                        path: 'fast',
                        view: {
                            form: async () => {
                                // 模拟快速加载
                                await new Promise(resolve => setTimeout(resolve, 500));
                                return `
                                    <div class="page-content">
                                        <h2>🐇 快速加载页面</h2>
                                        <p>这个页面加载很快（0.5秒）。</p>
                                        <p>您可能只能短暂看到loading状态。</p>
                                    </div>
                                `;
                            }
                        }
                    },
                    {
                        name: 'nested',
                        path: 'nested',
                        view: `
                            <div class="page-content">
                                <h2>📦 嵌套路由父页面</h2>
                                <p>这是一个包含子路由的页面。</p>
                                <div class="nested-outlet">
                                    <h3>子路由区域：</h3>
                                    <kylin-outlet></kylin-outlet>
                                </div>
                            </div>
                        `,
                        children: [
                            {
                                name: 'nested-slow',
                                path: 'slow',
                                view: {
                                    form: async () => {
                                        // 模拟嵌套路由的慢速加载
                                        await new Promise(resolve => setTimeout(resolve, 2000));
                                        return `
                                            <div class="page-content">
                                                <h4>🐢 嵌套慢速加载页面</h4>
                                                <p>这是嵌套在父路由中的慢速加载页面。</p>
                                                <p>注意上方的loading状态只在子outlet中显示。</p>
                                            </div>
                                        `;
                                    }
                                }
                            }
                        ]
                    }
                ]
            }
        });

        router.attach();

        console.log('✅ Loading 状态演示页面已加载');
        console.log('📝 提示：点击不同的链接来体验loading效果');
    </script>
</body>
</html>
